<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Roots & Routes</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../static/css/style.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg fixed-top scrolled" id="mainNav">
    <div class="container px-4">
      <a class="navbar-brand" href="index.html">
        <span class="brand-root">Roots</span><span class="brand-amp">&</span><span class="brand-route">Routes</span>
      </a>
    </div>
  </nav>

  <section class="auth-section">
    <div class="container">
      <div class="auth-card">
        <div class="text-center mb-4">
          <p class="section-eyebrow">✦ Join the Community</p>
          <h2>Create Your <em>Account</em></h2>
          <p>Start planning extraordinary journeys today.</p>
        </div>

        <button class="btn-google mb-4" onclick="signInWithGoogle()">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" /> Continue with Google
        </button>

        <div class="divider-text mb-4">or register with email</div>

        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" id="regName" class="form-control" placeholder="Your full name" />
        </div>
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" id="regEmail" class="form-control" placeholder="you@example.com" />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="position-relative">
            <input type="password" id="regPassword" class="form-control" placeholder="Min. 6 characters" />
            <button class="btn btn-sm position-absolute end-0 top-50 translate-middle-y me-2 border-0 bg-transparent text-muted" onclick="togglePassword('regPassword')">
              <i class="fa fa-eye"></i>
            </button>
          </div>
          <div class="password-strength mt-2" id="strengthBar"></div>
        </div>
        <div class="mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="agreeTerms" />
            <label class="form-check-label small text-muted" for="agreeTerms">
              I agree to the <a href="#" style="color:var(--terracotta)">Terms of Service</a> and <a href="#" style="color:var(--terracotta)">Privacy Policy</a>
            </label>
          </div>
        </div>

        <button class="btn btn-accent w-100 py-2 mb-3" onclick="handleRegister()">Create Account</button>

        <p class="text-center small text-muted">
          Already have an account? <a href="login.html" class="text-decoration-none fw-500" style="color:var(--terracotta)">Sign in</a>
        </p>
      </div>
    </div>
  </section>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999">
    <div id="appToast" class="toast align-items-center text-white bg-success border-0">
      <div class="d-flex">
        <div class="toast-body" id="toastMsg">Done!</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../static/js/firebase-config.js"></script>
  <script src="../static/js/app.js"></script>
  <script>
    function handleRegister() {
      const name = document.getElementById("regName").value.trim();
      const email = document.getElementById("regEmail").value.trim();
      const password = document.getElementById("regPassword").value;
      const agreed = document.getElementById("agreeTerms").checked;
      if (!name || !email || !password) { showToast("Please fill in all fields", "danger"); return; }
      if (password.length < 6) { showToast("Password must be at least 6 characters", "danger"); return; }
      if (!agreed) { showToast("Please accept the terms", "warning"); return; }
      if (typeof registerWithEmail === "function") {
        registerWithEmail(name, email, password);
      } else {
        showToast(`Welcome, ${name}! Account created (dev mode) 🎉`);
        setTimeout(() => window.location.href = "index.html", 1200);
      }
    }
    function togglePassword(id) {
      const el = document.getElementById(id);
      el.type = el.type === "password" ? "text" : "password";
    }
    document.getElementById("regPassword").addEventListener("input", function () {
      const val = this.value;
      const bar = document.getElementById("strengthBar");
      let strength = 0, label = "", color = "";
      if (val.length >= 6) strength++;
      if (/[A-Z]/.test(val)) strength++;
      if (/[0-9]/.test(val)) strength++;
      if (/[^a-zA-Z0-9]/.test(val)) strength++;
      const labels = ["Weak", "Fair", "Good", "Strong"];
      const colors = ["#e74c3c", "#e67e22", "#f1c40f", "#27ae60"];
      if (val.length > 0) {
        label = labels[strength - 1] || "Weak";
        color = colors[strength - 1] || "#e74c3c";
        bar.innerHTML = `<div style="height:4px;border-radius:4px;background:#eee;margin-top:4px"><div style="height:100%;width:${strength * 25}%;background:${color};border-radius:4px;transition:all 0.3s"></div></div><small style="color:${color};font-size:0.75rem">${label}</small>`;
      } else {
        bar.innerHTML = "";
      }
    });
  </script>
</body>
</html>
